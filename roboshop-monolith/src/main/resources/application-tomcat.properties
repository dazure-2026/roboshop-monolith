# Tomcat JNDI DataSource profile
# Activate with: -Dspring.profiles.active=tomcat
# Configure in Tomcat's context.xml:
# <Resource name="jdbc/roboshop" auth="Container" type="javax.sql.DataSource"
#   driverClassName="com.mysql.cj.jdbc.Driver"
#   url="jdbc:mysql://mysql-host:3306/roboshop?useSSL=false"
#   username="roboshop" password="RoboShop@1"
#   maxTotal="50" maxIdle="10" maxWaitMillis="10000" />

spring.datasource.jndi-name=java:comp/env/jdbc/roboshop
spring.sql.init.mode=never
