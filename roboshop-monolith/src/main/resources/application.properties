# RoboShop Monolith Configuration
spring.application.name=roboshop-monolith

# MySQL DataSource (for local development / Docker)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/roboshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:roboshop}
spring.datasource.password=${MYSQL_PASSWORD:RoboShop@1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=30m

# SQL init - disabled when using Docker (MySQL entrypoint handles it)
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/master-data.sql
spring.jpa.defer-datasource-initialization=true
