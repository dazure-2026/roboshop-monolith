<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#1a365d"/>
  <g transform="translate(30,45)">
    <!-- 3D chassis frame - top face -->
    <path d="M30 30 L110 20 L130 50 L50 60 Z" fill="#64748b" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Front face -->
    <path d="M50 60 L130 50 L130 95 L50 105 Z" fill="#475569" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Side face -->
    <path d="M30 30 L50 60 L50 105 L30 75 Z" fill="#334155" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Mounting holes -->
    <circle cx="45" cy="45" r="4" fill="#1a365d" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="115" cy="35" r="4" fill="#1a365d" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="120" cy="75" r="4" fill="#1a365d" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="45" cy="85" r="4" fill="#1a365d" stroke="#06b6d4" stroke-width="1"/>
    <!-- Cable routing channels -->
    <line x1="60" y1="55" x2="120" y2="47" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="55" y1="75" x2="125" y2="67" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <!-- Dimension line -->
    <text x="70" y="115" fill="#94a3b8" font-size="8" font-family="monospace">60x40x30cm</text>
  </g>
</svg>
