<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#1a365d"/>
  <g transform="translate(45,30)">
    <!-- Mounting plate -->
    <rect x="30" y="15" width="50" height="15" rx="4" fill="#64748b"/>
    <circle cx="45" cy="22" r="3" fill="#334155"/>
    <circle cx="65" cy="22" r="3" fill="#334155"/>
    <!-- Actuator body -->
    <rect x="35" y="30" width="40" height="30" rx="4" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
    <!-- Fingers -->
    <path d="M35 60 L20 95 L30 100 L42 65" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1"/>
    <path d="M75 60 L90 95 L80 100 L68 65" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1"/>
    <path d="M55 60 L55 100 L60 100 L60 60" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1"/>
    <!-- Finger tips with sensors -->
    <circle cx="25" cy="98" r="5" fill="#06b6d4" opacity="0.7"/>
    <circle cx="85" cy="98" r="5" fill="#06b6d4" opacity="0.7"/>
    <circle cx="57" cy="100" r="4" fill="#06b6d4" opacity="0.7"/>
    <!-- Force indicator -->
    <path d="M25 110 L85 110" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <text x="55" y="125" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">50N max</text>
  </g>
</svg>
