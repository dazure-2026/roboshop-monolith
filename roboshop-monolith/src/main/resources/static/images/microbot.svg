<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#1a365d"/>
  <g transform="translate(40,30)">
    <!-- Robot body -->
    <rect x="30" y="40" width="60" height="50" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <!-- Head -->
    <rect x="35" y="15" width="50" height="30" rx="6" fill="#64748b"/>
    <!-- Eyes -->
    <circle cx="50" cy="28" r="6" fill="#0f172a"/>
    <circle cx="50" cy="28" r="3" fill="#06b6d4"/>
    <circle cx="70" cy="28" r="6" fill="#0f172a"/>
    <circle cx="70" cy="28" r="3" fill="#06b6d4"/>
    <!-- Antenna -->
    <line x1="60" y1="15" x2="60" y2="5" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="60" cy="3" r="3" fill="#22c55e"/>
    <!-- Arms -->
    <rect x="15" y="50" width="15" height="8" rx="3" fill="#94a3b8"/>
    <rect x="90" y="50" width="15" height="8" rx="3" fill="#94a3b8"/>
    <!-- Wheels -->
    <circle cx="40" cy="95" r="10" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <circle cx="40" cy="95" r="4" fill="#64748b"/>
    <circle cx="80" cy="95" r="10" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <circle cx="80" cy="95" r="4" fill="#64748b"/>
    <!-- Chest panel -->
    <rect x="42" y="52" width="36" height="20" rx="3" fill="#334155"/>
    <rect x="46" y="56" width="8" height="3" rx="1" fill="#22c55e"/>
    <rect x="46" y="62" width="12" height="3" rx="1" fill="#06b6d4"/>
    <!-- Label -->
    <text x="60" y="125" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">Starter Kit</text>
  </g>
</svg>
