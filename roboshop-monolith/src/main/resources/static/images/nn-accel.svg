<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#1a365d"/>
  <g transform="translate(30,40)">
    <!-- PCB board -->
    <rect x="10" y="20" width="120" height="75" rx="4" fill="#1a4731" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <!-- GPU chip -->
    <rect x="35" y="35" width="50" height="40" rx="2" fill="#334155" stroke="#64748b" stroke-width="1.5"/>
    <rect x="40" y="40" width="40" height="30" rx="1" fill="#1e293b"/>
    <!-- Chip die -->
    <rect x="48" y="47" width="24" height="16" rx="1" fill="#7c3aed" opacity="0.6"/>
    <text x="60" y="58" text-anchor="middle" fill="#a78bfa" font-size="7" font-family="monospace">256T</text>
    <!-- Pin array top -->
    <g fill="#94a3b8">
      <rect x="38" y="30" width="2" height="5"/><rect x="44" y="30" width="2" height="5"/>
      <rect x="50" y="30" width="2" height="5"/><rect x="56" y="30" width="2" height="5"/>
      <rect x="62" y="30" width="2" height="5"/><rect x="68" y="30" width="2" height="5"/>
      <rect x="74" y="30" width="2" height="5"/><rect x="80" y="30" width="2" height="5"/>
    </g>
    <!-- Pin array bottom -->
    <g fill="#94a3b8">
      <rect x="38" y="75" width="2" height="5"/><rect x="44" y="75" width="2" height="5"/>
      <rect x="50" y="75" width="2" height="5"/><rect x="56" y="75" width="2" height="5"/>
      <rect x="62" y="75" width="2" height="5"/><rect x="68" y="75" width="2" height="5"/>
      <rect x="74" y="75" width="2" height="5"/><rect x="80" y="75" width="2" height="5"/>
    </g>
    <!-- Memory chips -->
    <rect x="15" y="30" width="12" height="8" rx="1" fill="#475569"/>
    <rect x="15" y="45" width="12" height="8" rx="1" fill="#475569"/>
    <rect x="15" y="60" width="12" height="8" rx="1" fill="#475569"/>
    <rect x="93" y="30" width="12" height="8" rx="1" fill="#475569"/>
    <rect x="93" y="45" width="12" height="8" rx="1" fill="#475569"/>
    <rect x="93" y="60" width="12" height="8" rx="1" fill="#475569"/>
    <!-- PCIe connector -->
    <rect x="25" y="95" width="90" height="10" rx="2" fill="#f59e0b" opacity="0.7"/>
    <text x="70" y="103" text-anchor="middle" fill="#1a365d" font-size="6" font-family="monospace">PCIe 5.0 x16</text>
    <!-- Traces -->
    <line x1="27" y1="34" x2="35" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <line x1="27" y1="49" x2="35" y2="49" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <line x1="85" y1="34" x2="93" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <line x1="85" y1="49" x2="93" y2="49" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
  </g>
</svg>
