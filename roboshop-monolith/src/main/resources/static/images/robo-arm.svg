<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#1a365d"/>
  <g transform="translate(40,30)">
    <!-- Base -->
    <rect x="40" y="130" width="40" height="20" rx="4" fill="#06b6d4"/>
    <rect x="30" y="140" width="60" height="15" rx="3" fill="#0891b2"/>
    <!-- Arm segments -->
    <rect x="52" y="70" width="16" height="65" rx="4" fill="#94a3b8" transform="rotate(-10 60 130)"/>
    <rect x="48" y="20" width="14" height="60" rx="4" fill="#cbd5e1" transform="rotate(15 55 50)"/>
    <!-- Joint circles -->
    <circle cx="60" cy="75" r="10" fill="#06b6d4" stroke="#0e7490" stroke-width="2"/>
    <circle cx="55" cy="25" r="8" fill="#06b6d4" stroke="#0e7490" stroke-width="2"/>
    <!-- Gripper -->
    <path d="M45 10 L40 0 M45 10 L50 0" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"/>
    <circle cx="45" cy="12" r="5" fill="#22d3ee"/>
  </g>
</svg>
