<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#1a365d"/>
  <g transform="translate(45,45)">
    <!-- Motor body -->
    <rect x="15" y="20" width="80" height="55" rx="6" fill="#475569"/>
    <rect x="20" y="25" width="70" height="45" rx="4" fill="#64748b"/>
    <!-- Output shaft -->
    <circle cx="85" cy="47" r="12" fill="#334155" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="85" cy="47" r="5" fill="#06b6d4"/>
    <!-- Wire connectors -->
    <rect x="15" y="35" width="8" height="6" rx="1" fill="#ef4444"/>
    <rect x="15" y="42" width="8" height="6" rx="1" fill="#f59e0b"/>
    <rect x="15" y="49" width="8" height="6" rx="1" fill="#22c55e"/>
    <!-- Label -->
    <rect x="35" y="35" width="30" height="20" rx="2" fill="#334155"/>
    <text x="50" y="49" text-anchor="middle" fill="#06b6d4" font-size="8" font-family="monospace">25kg</text>
    <!-- Second motor (stacked) -->
    <rect x="25" y="85" width="60" height="25" rx="4" fill="#475569" opacity="0.5"/>
    <circle cx="78" cy="97" r="8" fill="#334155" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
