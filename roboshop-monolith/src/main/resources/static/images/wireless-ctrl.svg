<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#1a365d"/>
  <g transform="translate(40,35)">
    <!-- Controller body -->
    <rect x="15" y="45" width="90" height="55" rx="12" fill="#475569"/>
    <rect x="20" y="50" width="80" height="45" rx="10" fill="#334155"/>
    <!-- Left joystick -->
    <circle cx="42" cy="72" r="12" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="42" cy="72" r="6" fill="#64748b"/>
    <!-- Right joystick -->
    <circle cx="78" cy="72" r="12" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="78" cy="72" r="6" fill="#64748b"/>
    <!-- Display -->
    <rect x="45" y="52" width="30" height="12" rx="2" fill="#0f172a"/>
    <text x="60" y="62" text-anchor="middle" fill="#06b6d4" font-size="6" font-family="monospace">2.4G</text>
    <!-- Antenna -->
    <line x1="60" y1="45" x2="60" y2="25" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="60" cy="22" r="3" fill="#22c55e"/>
    <!-- Signal waves -->
    <path d="M70 20 C75 15 75 25 70 20" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M75 17 C82 10 82 30 75 23" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M80 14 C89 5 89 35 80 26" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.2"/>
    <!-- Buttons -->
    <circle cx="90" cy="55" r="3" fill="#ef4444"/>
    <circle cx="30" cy="55" r="3" fill="#2563eb"/>
  </g>
</svg>
