<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Home</title></head>
<body>
<div layout:fragment="content">
    <section class="hero">
        <h1>Welcome to RoboShop</h1>
        <p>Your one-stop shop for robotics components, AI modules, and automation gear</p>
        <a th:href="@{/catalogue}" class="btn-primary">Browse Catalogue</a>
    </section>

    <section class="section">
        <h2>Featured Products</h2>
        <div class="product-grid">
            <div th:each="product : ${featuredProducts}" class="product-card">
                <div class="product-image">
                    <span class="product-category-badge" th:text="${product.category}">Category</span>
                    <img th:src="${product.imageUrl}" th:alt="${product.name}" class="product-img"/>
                </div>
                <div class="product-info">
                    <h3 th:text="${product.name}">Product Name</h3>
                    <p class="product-desc" th:text="${#strings.abbreviate(product.description, 80)}">Description</p>
                    <div class="product-footer">
                        <span class="product-price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</span>
                        <a th:href="@{/product/{id}(id=${product.id})}" class="btn-secondary">View Details</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
