<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - RoboShop">RoboShop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <a href="/" class="logo">
                <span class="logo-icon">&#9881;</span> RoboShop
            </a>
            <nav class="nav">
                <a th:href="@{/}" class="nav-link">Home</a>
                <a th:href="@{/catalogue}" class="nav-link">Catalogue</a>
                <div class="nav-right">
                    <a th:href="@{/cart}" class="nav-link cart-link">
                        &#128722; Cart
                        <span class="cart-badge" th:if="${cartItemCount != null && cartItemCount > 0}" th:text="${cartItemCount}">0</span>
                    </a>
                    <th:block th:if="${currentUser != null}">
                        <a th:href="@{/orders}" class="nav-link">Orders</a>
                        <a th:href="@{/profile}" class="nav-link" th:text="'Hi, ' + ${currentUser.firstName != null ? currentUser.firstName : currentUser.username}">Profile</a>
                        <a th:href="@{/logout}" class="nav-link btn-outline">Logout</a>
                    </th:block>
                    <th:block th:unless="${currentUser != null}">
                        <a th:href="@{/login}" class="nav-link">Login</a>
                        <a th:href="@{/register}" class="nav-link btn-primary-sm">Register</a>
                    </th:block>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container" layout:fragment="content">
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 RoboShop. All rights reserved.</p>
            <p class="footer-note">Robotics &amp; AI Components | Fast Shipping Worldwide</p>
        </div>
    </footer>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
