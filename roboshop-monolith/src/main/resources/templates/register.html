<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Register</title></head>
<body>
<div layout:fragment="content">
    <div class="auth-container">
        <h1>Create Account</h1>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}">Error</div>

        <form th:action="@{/register}" method="post" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required class="form-input">
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required class="form-input">
                </div>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required class="form-input">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required class="form-input">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="form-input" minlength="6">
            </div>
            <div class="form-group">
                <label for="phone">Phone (optional)</label>
                <input type="tel" id="phone" name="phone" class="form-input">
            </div>
            <button type="submit" class="btn-primary btn-lg btn-block">Register</button>
        </form>
        <p class="auth-link">Already have an account? <a th:href="@{/login}">Login here</a></p>
    </div>
</div>
</body>
</html>
